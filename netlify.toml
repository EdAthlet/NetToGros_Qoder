[build]
  publish = "."

# Netlify Forms (required once per site):
# 1. Netlify UI → Forms → "Enable form detection" (OFF by default on new sites)
# 2. Deploy again after enabling
# 3. Forms → contact → Form notifications → Email → nettogross.eire@gmail.com

# Keep service worker fresh (avoid caching issues)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/payroll/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Uncomment if you later use a client-side router (React, Vue, etc.)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
