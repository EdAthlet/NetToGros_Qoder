[build]
  publish = "."

# After first deploy with the Help contact form, enable email notifications:
# Netlify UI → Site → Forms → contact → Form notifications → Email notification
# → nettogross.eire@gmail.com

# Keep service worker fresh (avoid caching issues)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/payroll/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Uncomment if you later use a client-side router (React, Vue, etc.)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
